<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WotsApp — Contact Editor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b1418;
      --panel:     #182229;
      --card:      #202c33;
      --input-bg:  #2a3942;
      --border:    #2a3942;
      --accent:    #00a884;
      --accent2:   #008069;
      --danger:    #f15c6d;
      --warn:      #e67e22;
      --text:      #e9edef;
      --text2:     #8696a0;
      --text3:     #667781;
      --radius:    10px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 15px;
    }

    /* ── Layout ── */
    #page {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 80px;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 36px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .header-left { display: flex; align-items: center; gap: 14px; }
    .logo {
      width: 42px; height: 42px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; font-weight: 700; color: white;
      text-decoration: none;
    }
    header h1 { font-size: 22px; font-weight: 500; }
    header h1 span { color: var(--text2); font-size: 14px; font-weight: 400; margin-left: 8px; }
    .back-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
      display: flex; align-items: center; gap: 5px;
    }
    .back-link:hover { text-decoration: underline; }

    /* ── Sections ── */
    section { margin-bottom: 48px; }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 18px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 12px;
    }
    .section-title {
      font-size: 17px;
      font-weight: 500;
      color: var(--text);
    }
    .section-count {
      font-size: 13px;
      color: var(--text2);
      background: var(--input-bg);
      padding: 2px 8px;
      border-radius: 10px;
      margin-left: 8px;
    }

    /* ── Buttons ── */
    .btn {
      border: none;
      border-radius: 8px;
      font-family: var(--font);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      padding: 9px 18px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s, opacity 0.15s;
    }
    .btn svg { width: 16px; height: 16px; flex-shrink: 0; }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent2); }
    .btn-secondary { background: var(--input-bg); color: var(--text); }
    .btn-secondary:hover { background: var(--border); }
    .btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
    .btn-danger:hover { background: rgba(241,92,109,0.1); }
    .btn-warn { background: transparent; color: var(--warn); border: 1px solid var(--warn); }
    .btn-warn:hover { background: rgba(230,126,34,0.1); }
    .btn-sm { padding: 6px 12px; font-size: 13px; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ── Contact cards ── */
    #contacts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .contact-card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 18px;
      border: 1px solid transparent;
      transition: border-color 0.15s;
      cursor: default;
    }
    .contact-card:hover { border-color: var(--border); }
    .contact-card.editing { border-color: var(--accent); }

    .card-top {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }
    .contact-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
      cursor: pointer;
      user-select: none;
      transition: opacity 0.15s;
    }
    .contact-avatar:hover { opacity: 0.85; }
    .card-info { flex: 1; min-width: 0; }
    .card-name { font-size: 16px; font-weight: 500; margin-bottom: 3px; }
    .card-personality {
      font-size: 13px;
      color: var(--text2);
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      line-height: 1.4;
    }

    .card-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* ── Inline editor (inside card) ── */
    .card-editor {
      display: none;
      flex-direction: column;
      gap: 14px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .card-editor.open { display: flex; }

    .field-label {
      font-size: 12px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    .field-input, .field-textarea, .field-select {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
    }
    .field-input:focus, .field-textarea:focus, .field-select:focus {
      border-color: var(--accent);
    }
    .field-textarea { resize: vertical; min-height: 90px; line-height: 1.5; }
    .field-textarea.learn-area { min-height: 70px; background: #1a2730; border-color: var(--warn); }
    .field-textarea.learn-area:focus { border-color: var(--warn); box-shadow: 0 0 0 2px rgba(230,126,34,0.15); }

    /* Color swatches */
    .color-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .color-swatch {
      width: 28px; height: 28px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color 0.1s, transform 0.1s;
      flex-shrink: 0;
    }
    .color-swatch:hover { transform: scale(1.15); }
    .color-swatch.selected { border-color: white; }
    .color-custom {
      width: 28px; height: 28px;
      border-radius: 50%;
      border: 2px dashed var(--text2);
      cursor: pointer;
      background: transparent;
      padding: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--text2);
      font-size: 16px;
      font-weight: 300;
    }

    /* Learn section */
    .learn-hint {
      font-size: 12px;
      color: var(--text2);
      margin-top: 4px;
      line-height: 1.4;
    }
    .learn-hint b { color: var(--warn); }

    /* Editor actions row */
    .editor-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 4px;
    }

    /* ── Group cards ── */
    #groups-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .group-card {
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .group-card.editing { border-color: var(--accent); }

    .group-card-top {
      display: flex;
      align-items: center;
      padding: 16px 18px;
      gap: 14px;
    }
    .group-avatar {
      width: 48px; height: 48px;
      border-radius: 50%;
      background: #4a5568;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    .group-info { flex: 1; min-width: 0; }
    .group-name { font-size: 16px; font-weight: 500; margin-bottom: 3px; }
    .group-members-preview { font-size: 13px; color: var(--text2); }
    .group-actions { display: flex; gap: 6px; }

    .group-editor {
      display: none;
      flex-direction: column;
      gap: 14px;
      padding: 0 18px 18px;
      border-top: 1px solid var(--border);
      margin-top: 0;
      padding-top: 16px;
    }
    .group-editor.open { display: flex; }

    .member-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 8px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      max-height: 220px;
      overflow-y: auto;
    }
    .member-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.1s;
      font-size: 14px;
    }
    .member-toggle:hover { background: var(--border); }
    .member-toggle input[type=checkbox] { accent-color: var(--accent); width: 15px; height: 15px; cursor: pointer; flex-shrink: 0; }
    .member-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── New contact form ── */
    #new-contact-form {
      display: none;
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--accent);
      padding: 22px;
      margin-top: 14px;
    }
    #new-contact-form.open { display: block; }
    #new-contact-form .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 16px;
    }
    #new-contact-form .form-grid .span2 { grid-column: span 2; }
    @media (max-width: 560px) {
      #new-contact-form .form-grid { grid-template-columns: 1fr; }
      #new-contact-form .form-grid .span2 { grid-column: span 1; }
    }

    /* ── New group form ── */
    #new-group-form {
      display: none;
      background: var(--card);
      border-radius: var(--radius);
      border: 1px solid var(--accent);
      padding: 22px;
      margin-top: 14px;
    }
    #new-group-form.open { display: block; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--panel);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    #toast.err { border-left: 3px solid var(--danger); }

    /* ── Confirm overlay ── */
    #confirm-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      display: flex; align-items: center; justify-content: center;
      z-index: 200;
      backdrop-filter: blur(2px);
    }
    #confirm-overlay.hidden { display: none; }
    #confirm-box {
      background: #233138;
      border-radius: 12px;
      padding: 28px 32px;
      max-width: 380px;
      width: 90vw;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }
    #confirm-box h3 { font-size: 18px; margin-bottom: 10px; }
    #confirm-box p { font-size: 14px; color: var(--text2); margin-bottom: 24px; line-height: 1.5; }
    #confirm-box .row { display: flex; gap: 10px; justify-content: flex-end; }

    /* ── Empty state ── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text2);
      font-size: 14px;
      line-height: 1.7;
    }
    .empty-state .big { font-size: 36px; margin-bottom: 8px; }
  </style>
</head>
<body>
<div id="page">

  <header>
    <div class="header-left">
      <a href="/" class="logo">W</a>
      <h1>Contact Editor <span>hidden admin panel</span></h1>
    </div>
    <a href="/" class="back-link">
      <svg viewBox="0 0 24 24" fill="currentColor" width="16" height="16"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Back to WotsApp
    </a>
  </header>

  <!-- ── Contacts ── -->
  <section id="section-contacts">
    <div class="section-header">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="section-title">Contacts</span>
        <span class="section-count" id="contacts-count">0</span>
      </div>
      <button class="btn btn-primary btn-sm" id="btn-add-contact">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        Add Contact
      </button>
    </div>

    <!-- New contact form -->
    <div id="new-contact-form">
      <div class="form-grid">
        <div>
          <div class="field-label">Name</div>
          <input type="text" class="field-input" id="new-name" placeholder="e.g. Jamie" />
        </div>
        <div>
          <div class="field-label">Avatar color</div>
          <div class="color-row" id="new-color-row"></div>
        </div>
        <div class="span2">
          <div class="field-label">Personality / System Prompt</div>
          <textarea class="field-textarea" id="new-personality" rows="4" placeholder="Describe who this person is. This becomes their AI system prompt.&#10;&#10;e.g. Jamie is a 28-year-old graphic designer from Glasgow. Sarcastic wit, obsessed with vintage music, genuinely caring underneath the bluster."></textarea>
        </div>
      </div>
      <div class="editor-actions">
        <button class="btn btn-secondary" id="btn-cancel-new">Cancel</button>
        <button class="btn btn-primary" id="btn-save-new">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          Create Contact
        </button>
      </div>
    </div>

    <div id="contacts-grid"></div>
  </section>

  <!-- ── Groups ── -->
  <section id="section-groups">
    <div class="section-header">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="section-title">Group Chats</span>
        <span class="section-count" id="groups-count">0</span>
      </div>
      <button class="btn btn-primary btn-sm" id="btn-add-group">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        New Group
      </button>
    </div>

    <!-- New group form -->
    <div id="new-group-form">
      <div style="margin-bottom:14px">
        <div class="field-label">Group name</div>
        <input type="text" class="field-input" id="new-group-name" placeholder="e.g. The Gang" />
      </div>
      <div>
        <div class="field-label">Members (pick 2+)</div>
        <div class="member-grid" id="new-group-members"></div>
      </div>
      <div class="editor-actions" style="margin-top:14px">
        <button class="btn btn-secondary" id="btn-cancel-new-group">Cancel</button>
        <button class="btn btn-primary" id="btn-save-new-group">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          Create Group
        </button>
      </div>
    </div>

    <div id="groups-list"></div>
  </section>

</div>

<!-- Confirm dialog -->
<div id="confirm-overlay" class="hidden">
  <div id="confirm-box">
    <h3 id="confirm-title">Are you sure?</h3>
    <p id="confirm-msg"></p>
    <div class="row">
      <button class="btn btn-secondary" id="btn-confirm-cancel">Cancel</button>
      <button class="btn btn-danger" id="btn-confirm-ok">Delete</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ─── Constants ───────────────────────────────────────────────────────────────

const COLORS = [
  '#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c',
  '#3498db','#2980b9','#9b59b6','#e91e63','#607d8b'
];

// ─── State ───────────────────────────────────────────────────────────────────

let contacts = [];
let groups = [];
let newContactColor = COLORS[5];

// ─── Init ────────────────────────────────────────────────────────────────────

async function init() {
  await Promise.all([loadContacts(), loadGroups()]);
  renderContactsGrid();
  renderGroupsList();
  setupNewContactColorRow();
  setupEventListeners();
}

// ─── API ─────────────────────────────────────────────────────────────────────

async function api(method, path, body) {
  const r = await fetch(path, {
    method,
    headers: { 'Content-Type': 'application/json' },
    body: body ? JSON.stringify(body) : undefined
  });
  if (!r.ok) { const e = await r.json().catch(() => ({})); throw new Error(e.error || r.statusText); }
  return r.json();
}

async function loadContacts() { contacts = await api('GET', '/api/contacts'); }
async function loadGroups() { groups = await api('GET', '/api/groups'); }

// ─── Contacts grid ────────────────────────────────────────────────────────────

function renderContactsGrid() {
  const grid = document.getElementById('contacts-grid');
  document.getElementById('contacts-count').textContent = contacts.length;

  if (!contacts.length) {
    grid.innerHTML = '<div class="empty-state"><div class="big">👤</div>No contacts yet. Add one above.</div>';
    return;
  }

  grid.innerHTML = '';
  contacts.forEach(c => grid.appendChild(buildContactCard(c)));
}

function buildContactCard(contact) {
  const card = document.createElement('div');
  card.className = 'contact-card';
  card.id = `card-${contact.id}`;

  const initial = contact.emoji || contact.name.charAt(0).toUpperCase();
  const shortBio = contact.personality ? contact.personality.slice(0, 100) + (contact.personality.length > 100 ? '…' : '') : '';

  card.innerHTML = `
    <div class="card-top">
      <div class="contact-avatar" style="background:${contact.color}" data-id="${contact.id}" title="Click to change color">${initial}</div>
      <div class="card-info">
        <div class="card-name">${esc(contact.name)}</div>
        <div class="card-personality">${esc(shortBio)}</div>
      </div>
    </div>
    <div class="card-actions">
      <button class="btn btn-secondary btn-sm" onclick="toggleEdit('${contact.id}')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
        Edit
      </button>
      <button class="btn btn-warn btn-sm" onclick="toggleLearn('${contact.id}')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3zM5 13.18v4L12 21l7-3.82v-4L12 17l-7-3.82z"/></svg>
        Learn Personality
      </button>
      <button class="btn btn-danger btn-sm" onclick="deleteContact('${contact.id}', '${esc(contact.name)}')">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
      </button>
    </div>

    <!-- Edit panel -->
    <div class="card-editor" id="edit-${contact.id}">
      <div>
        <div class="field-label">Name</div>
        <input type="text" class="field-input" id="edit-name-${contact.id}" value="${esc(contact.name)}" />
      </div>
      <div>
        <div class="field-label">Avatar color</div>
        <div class="color-row" id="color-row-${contact.id}"></div>
      </div>
      <div>
        <div class="field-label">Personality / System Prompt</div>
        <textarea class="field-textarea" id="edit-personality-${contact.id}" rows="5">${esc(contact.personality || '')}</textarea>
      </div>

      <!-- Learn panel (nested inside edit) -->
      <div id="learn-panel-${contact.id}" style="display:none; padding:14px; background:#111d24; border-radius:8px; border:1px solid var(--warn)">
        <div class="field-label" style="color:var(--warn);margin-bottom:6px">Learn Personality</div>
        <textarea class="field-textarea learn-area" id="learn-text-${contact.id}" rows="3" placeholder="Describe this person in plain English and it will become their system prompt.&#10;&#10;e.g. Jamie is a 28-year-old graphic designer from Glasgow. Witty and sarcastic, obsessed with vintage music, but genuinely warm underneath."></textarea>
        <p class="learn-hint" style="margin-top:8px">Your description will be saved directly as the AI personality prompt. <b>Clear and specific</b> descriptions produce better results.</p>
        <div style="display:flex;gap:8px;margin-top:10px;justify-content:flex-end">
          <button class="btn btn-secondary btn-sm" onclick="toggleLearnPanel('${contact.id}', false)">Cancel</button>
          <button class="btn btn-sm" style="background:var(--warn);color:white" onclick="applyLearn('${contact.id}')">Apply as Personality</button>
        </div>
      </div>

      <div class="editor-actions">
        <button class="btn btn-secondary btn-sm" onclick="toggleEdit('${contact.id}')">Cancel</button>
        <button class="btn btn-primary btn-sm" onclick="saveContact('${contact.id}')">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          Save
        </button>
      </div>
    </div>
  `;

  // Build color swatches after inserting into DOM
  requestAnimationFrame(() => {
    const row = card.querySelector(`#color-row-${contact.id}`);
    if (row) buildColorRow(row, contact.color, color => {
      contact._pendingColor = color;
      card.querySelector('.contact-avatar').style.background = color;
    });
  });

  return card;
}

function toggleEdit(id) {
  const panel = document.getElementById(`edit-${id}`);
  const card = document.getElementById(`card-${id}`);
  const isOpen = panel.classList.contains('open');
  // Close all others
  document.querySelectorAll('.card-editor.open').forEach(p => {
    p.classList.remove('open');
    p.closest('.contact-card')?.classList.remove('editing');
  });
  if (!isOpen) {
    panel.classList.add('open');
    card.classList.add('editing');
    document.getElementById(`edit-name-${id}`)?.focus();
  }
}

function toggleLearn(id) {
  // Open edit panel first if needed
  const editPanel = document.getElementById(`edit-${id}`);
  if (!editPanel.classList.contains('open')) toggleEdit(id);
  toggleLearnPanel(id, true);
}

function toggleLearnPanel(id, show) {
  const panel = document.getElementById(`learn-panel-${id}`);
  if (!panel) return;
  panel.style.display = show ? 'block' : 'none';
  if (show) document.getElementById(`learn-text-${id}`)?.focus();
}

function applyLearn(id) {
  const learnText = document.getElementById(`learn-text-${id}`)?.value.trim();
  if (!learnText) { toast('Enter a description first', true); return; }
  const ta = document.getElementById(`edit-personality-${id}`);
  if (ta) ta.value = learnText;
  toggleLearnPanel(id, false);
  toast('Description applied — click Save to persist');
}

async function saveContact(id) {
  const contact = contacts.find(c => c.id === id);
  if (!contact) return;
  const name = document.getElementById(`edit-name-${id}`)?.value.trim();
  const personality = document.getElementById(`edit-personality-${id}`)?.value.trim();
  if (!name) { toast('Name is required', true); return; }

  // Determine color: pendingColor from swatch click, or existing
  const card = document.getElementById(`card-${id}`);
  const avatarEl = card?.querySelector('.contact-avatar');
  const color = avatarEl?.style.background || contact.color;

  try {
    const updated = await api('PUT', `/api/contacts/${id}`, { name, personality, color });
    Object.assign(contact, updated);
    toast(`${name} saved`);
    toggleEdit(id);
    renderContactsGrid();
  } catch (e) { toast(e.message, true); }
}

function deleteContact(id, name) {
  confirm(`Delete ${name}?`, `This will permanently delete ${name} and cannot be undone. Their chat history will remain on disk.`, async () => {
    try {
      await api('DELETE', `/api/contacts/${id}`);
      contacts = contacts.filter(c => c.id !== id);
      toast(`${name} deleted`);
      renderContactsGrid();
      renderGroupsList(); // member lists may have changed
    } catch (e) { toast(e.message, true); }
  });
}

// New contact
function setupNewContactColorRow() {
  const row = document.getElementById('new-color-row');
  buildColorRow(row, newContactColor, c => { newContactColor = c; });
}

async function saveNewContact() {
  const name = document.getElementById('new-name').value.trim();
  const personality = document.getElementById('new-personality').value.trim();
  if (!name) { toast('Name is required', true); return; }
  if (!personality) { toast('Personality is required', true); return; }
  try {
    const c = await api('POST', '/api/contacts', { name, personality, color: newContactColor });
    contacts.push(c);
    toast(`${name} created`);
    document.getElementById('new-name').value = '';
    document.getElementById('new-personality').value = '';
    document.getElementById('new-contact-form').classList.remove('open');
    renderContactsGrid();
    // Refresh new-group member lists if open
    buildNewGroupMemberList();
  } catch (e) { toast(e.message, true); }
}

// ─── Groups ──────────────────────────────────────────────────────────────────

function renderGroupsList() {
  const list = document.getElementById('groups-list');
  document.getElementById('groups-count').textContent = groups.length;

  if (!groups.length) {
    list.innerHTML = '<div class="empty-state"><div class="big">👥</div>No groups yet.</div>';
    return;
  }

  list.innerHTML = '';
  groups.forEach(g => list.appendChild(buildGroupCard(g)));
}

function buildGroupCard(group) {
  const card = document.createElement('div');
  card.className = 'group-card';
  card.id = `gcard-${group.id}`;

  const memberNames = (group.members || [])
    .map(id => contacts.find(c => c.id === id)?.name).filter(Boolean);
  const preview = memberNames.length ? memberNames.join(', ') : 'No members';
  const initials = group.name.split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();

  card.innerHTML = `
    <div class="group-card-top">
      <div class="group-avatar">${initials}</div>
      <div class="group-info">
        <div class="group-name">${esc(group.name)}</div>
        <div class="group-members-preview">${esc(preview)}</div>
      </div>
      <div class="group-actions">
        <button class="btn btn-secondary btn-sm" onclick="toggleGroupEdit('${group.id}')">
          <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 0 0 0-1.41l-2.34-2.34a1 1 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
          Edit
        </button>
        <button class="btn btn-danger btn-sm" onclick="deleteGroup('${group.id}', '${esc(group.name)}')">
          <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
        </button>
      </div>
    </div>
    <div class="group-editor" id="gedit-${group.id}">
      <div>
        <div class="field-label">Group name</div>
        <input type="text" class="field-input" id="gedit-name-${group.id}" value="${esc(group.name)}" />
      </div>
      <div>
        <div class="field-label">Members</div>
        <div class="member-grid" id="gedit-members-${group.id}"></div>
      </div>
      <div class="editor-actions">
        <button class="btn btn-secondary btn-sm" onclick="toggleGroupEdit('${group.id}')">Cancel</button>
        <button class="btn btn-primary btn-sm" onclick="saveGroup('${group.id}')">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
          Save
        </button>
      </div>
    </div>
  `;

  // Build member checkboxes after DOM insertion
  requestAnimationFrame(() => buildGroupMemberGrid(`gedit-members-${group.id}`, group.members || []));

  return card;
}

function buildGroupMemberGrid(containerId, selectedIds) {
  const container = document.getElementById(containerId);
  if (!container) return;
  container.innerHTML = '';
  if (!contacts.length) {
    container.innerHTML = '<div style="color:var(--text2);font-size:13px;padding:4px">No contacts yet</div>';
    return;
  }
  contacts.forEach(c => {
    const label = document.createElement('label');
    label.className = 'member-toggle';
    label.innerHTML = `
      <input type="checkbox" value="${c.id}" ${selectedIds.includes(c.id) ? 'checked' : ''} />
      <span class="member-dot" style="background:${c.color}"></span>
      <span>${esc(c.name)}</span>
    `;
    container.appendChild(label);
  });
}

function buildNewGroupMemberList() {
  buildGroupMemberGrid('new-group-members', []);
}

function toggleGroupEdit(id) {
  const panel = document.getElementById(`gedit-${id}`);
  const card = document.getElementById(`gcard-${id}`);
  const isOpen = panel.classList.contains('open');
  document.querySelectorAll('.group-editor.open').forEach(p => {
    p.classList.remove('open');
    p.closest('.group-card')?.classList.remove('editing');
  });
  if (!isOpen) {
    panel.classList.add('open');
    card.classList.add('editing');
    buildGroupMemberGrid(`gedit-members-${id}`, groups.find(g => g.id === id)?.members || []);
    document.getElementById(`gedit-name-${id}`)?.focus();
  }
}

async function saveGroup(id) {
  const group = groups.find(g => g.id === id);
  if (!group) return;
  const name = document.getElementById(`gedit-name-${id}`)?.value.trim();
  const members = [...document.querySelectorAll(`#gedit-members-${id} input:checked`)].map(i => i.value);
  if (!name) { toast('Group name is required', true); return; }
  if (members.length < 2) { toast('Select at least 2 members', true); return; }
  try {
    const updated = await api('PUT', `/api/groups/${id}`, { name, members });
    Object.assign(group, updated);
    toast(`${name} saved`);
    toggleGroupEdit(id);
    renderGroupsList();
  } catch (e) { toast(e.message, true); }
}

function deleteGroup(id, name) {
  confirm(`Delete "${name}"?`, 'This will permanently delete the group. Chat history will remain on disk.', async () => {
    try {
      await api('DELETE', `/api/groups/${id}`);
      groups = groups.filter(g => g.id !== id);
      toast(`Group deleted`);
      renderGroupsList();
    } catch (e) { toast(e.message, true); }
  });
}

async function saveNewGroup() {
  const name = document.getElementById('new-group-name').value.trim();
  const members = [...document.querySelectorAll('#new-group-members input:checked')].map(i => i.value);
  if (!name) { toast('Group name is required', true); return; }
  if (members.length < 2) { toast('Select at least 2 members', true); return; }
  try {
    const g = await api('POST', '/api/groups', { name, members });
    groups.push(g);
    toast(`Group "${name}" created`);
    document.getElementById('new-group-name').value = '';
    document.getElementById('new-group-form').classList.remove('open');
    renderGroupsList();
  } catch (e) { toast(e.message, true); }
}

// ─── Color row builder ────────────────────────────────────────────────────────

function buildColorRow(container, currentColor, onChange) {
  container.innerHTML = '';
  COLORS.forEach(color => {
    const swatch = document.createElement('div');
    swatch.className = 'color-swatch' + (color === currentColor ? ' selected' : '');
    swatch.style.background = color;
    swatch.title = color;
    swatch.addEventListener('click', () => {
      container.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      swatch.classList.add('selected');
      onChange(color);
    });
    container.appendChild(swatch);
  });
}

// ─── Confirm dialog ───────────────────────────────────────────────────────────

let _confirmCb = null;
function confirm(title, msg, cb) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent = msg;
  _confirmCb = cb;
  document.getElementById('confirm-overlay').classList.remove('hidden');
}

// ─── Toast ────────────────────────────────────────────────────────────────────

let _toastTimer = null;
function toast(msg, err = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show' + (err ? ' err' : '');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { el.className = ''; }, 3500);
}

// ─── Helpers ─────────────────────────────────────────────────────────────────

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Event listeners ─────────────────────────────────────────────────────────

function setupEventListeners() {
  // New contact
  document.getElementById('btn-add-contact').addEventListener('click', () => {
    const form = document.getElementById('new-contact-form');
    form.classList.toggle('open');
    if (form.classList.contains('open')) document.getElementById('new-name').focus();
  });
  document.getElementById('btn-cancel-new').addEventListener('click', () => {
    document.getElementById('new-contact-form').classList.remove('open');
  });
  document.getElementById('btn-save-new').addEventListener('click', saveNewContact);

  // New group
  document.getElementById('btn-add-group').addEventListener('click', () => {
    const form = document.getElementById('new-group-form');
    form.classList.toggle('open');
    if (form.classList.contains('open')) {
      buildNewGroupMemberList();
      document.getElementById('new-group-name').focus();
    }
  });
  document.getElementById('btn-cancel-new-group').addEventListener('click', () => {
    document.getElementById('new-group-form').classList.remove('open');
  });
  document.getElementById('btn-save-new-group').addEventListener('click', saveNewGroup);

  // Confirm dialog
  document.getElementById('btn-confirm-cancel').addEventListener('click', () => {
    document.getElementById('confirm-overlay').classList.add('hidden');
    _confirmCb = null;
  });
  document.getElementById('btn-confirm-ok').addEventListener('click', () => {
    document.getElementById('confirm-overlay').classList.add('hidden');
    if (_confirmCb) { _confirmCb(); _confirmCb = null; }
  });
  document.getElementById('confirm-overlay').addEventListener('click', e => {
    if (e.target === e.currentTarget) {
      e.currentTarget.classList.add('hidden');
      _confirmCb = null;
    }
  });

  // Enter to save in name inputs
  document.getElementById('new-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('new-personality').focus();
  });
  document.getElementById('new-group-name').addEventListener('keydown', e => {
    if (e.key === 'Enter') saveNewGroup();
  });

  // Escape closes forms
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
      document.getElementById('new-contact-form').classList.remove('open');
      document.getElementById('new-group-form').classList.remove('open');
      document.getElementById('confirm-overlay').classList.add('hidden');
      document.querySelectorAll('.card-editor.open').forEach(p => {
        p.classList.remove('open');
        p.closest('.contact-card')?.classList.remove('editing');
      });
      document.querySelectorAll('.group-editor.open').forEach(p => {
        p.classList.remove('open');
        p.closest('.group-card')?.classList.remove('editing');
      });
    }
  });
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
